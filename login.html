      width: min(90vw, 340px);

      text-align: center;

      margin-top: 14px;

      color: #333;
      font-size: 14px;

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #406AAF;
      color: white;
      font-size: 16px;

    button:hover {

    }

    .error {

      color: red;
      font-size: 14px;
      display: none;
      line-height: 1.5;

  async function sha256(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text.normalize("NFC"));
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));

    return hashArray
      .map(byte => byte.toString(16).padStart(2, "0"))
      .join("");
  }

      attempts++;
