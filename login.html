<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#111;
      font-family:Arial;
    }

    .box{
      background:white;
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:300px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:15px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#406AAF;
      color:white;
      font-size:16px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Web lớp riêng tư</h2>

  <input type="password" id="password" placeholder="Nhập mật khẩu">

  <button onclick="login()">Vào web</button>
</div>

<script>

function login(){

  // kiểm tra đang bị khóa không
  const lockUntil = localStorage.getItem("lockUntil");

  if(lockUntil && Date.now() < lockUntil){

      const seconds = Math.ceil((lockUntil - Date.now()) / 1000);

      alert("Đi chỗ khác đi, bị khóa rùi. Thử lại sau " + seconds + " giây.");

      return;
  }

  const pass1 = document.getElementById("pass1").value.trim();
  const pass2 = document.getElementById("pass2").value.trim();

  const accounts = [

    {
      pass1: "Nguyen van A",
      pass2: "LT"
    },

    {
      pass1: "Nguyen van B",
      pass2: "LP"
    }

  ];

  const isValid = accounts.some(account =>
      account.pass1 === pass1 &&
      account.pass2 === pass2
  );

  // đúng mật khẩu
  if(isValid){

      localStorage.setItem("loggedIn","true");

      localStorage.removeItem("attempts");
      localStorage.removeItem("lockUntil");

      window.location.href="home.html";

  }else{

      let attempts = Number(localStorage.getItem("attempts")) || 0;

      attempts++;

      localStorage.setItem("attempts", attempts);

      // sai quá 3 lần
      if(attempts >= 3){

          // khóa 1 phút
          const lockTime = Date.now() + 60000;

          localStorage.setItem("lockUntil", lockTime);

          alert("Có mật khẩu mà sai hoài v");

          return;
      }

      alert("Sai thông tin");

  }

}

</script>

</body>
</html>
