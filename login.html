<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sảnh chờ Fifa</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #F7F6E5;
      font-family: Arial, sans-serif;
    }

    .login-box {
      width: 340px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 {
      color: #406AAF;
      margin-bottom: 10px;
    }

    .note {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 14px;
      font-weight: bold;
      color: #333;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #406AAF;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2f518c;
    }

    .error {
      margin-top: 14px;
      color: red;
      font-size: 14px;
      display: none;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Biết đây là đâu hong</h2>

    <div class="note">
      Nhớ trả lời câu hỏi để vô nhe
    </div>

    <label for="pass1">Tên tui là (Có dấu, viết hoa chữ đầu)</label>
    <input type="password" id="pass1" placeholder="Ví dụ: Nguyễn Văn A">

    <label for="pass2">Sanh thần của tui là... (dd/mm)</label>
    <input type="password" id="pass2" placeholder="Ví dụ: 03/33">

    <button onclick="login()">Login</button>

    <div id="error" class="error">
      Sai thông tin. Nhớ check lại xem có lộn lớp không nha
    </div>
  </div>

  <script>
    function login() {

      // 1. Kiểm tra đang bị khóa không
      const lockUntil = localStorage.getItem("lockUntil");

      if (lockUntil && Date.now() < Number(lockUntil)) {
        const seconds = Math.ceil((Number(lockUntil) - Date.now()) / 1000);

        document.getElementById("error").style.display = "block";
        document.getElementById("error").innerText =
          "Tặng bạn vé ra đảo. Quay lại sau " + seconds + " giây.";

        return;
      }

      // 2. Lấy dữ liệu người dùng nhập
      const pass1 = document.getElementById("pass1").value.trim();
      const pass2 = document.getElementById("pass2").value.trim();

      // 3. Danh sách nhiều cặp mật khẩu
      const accounts = [
        {
          pass1: "Nguyen van A",
          pass2: "LT"
        },
        {
          pass1: "Nguyen van B",
          pass2: "LP"
        },
        {
          pass1: "Nguyen van C",
          pass2: "LA"
        }
      ];

      // 4. Kiểm tra đúng cặp hay không
      const isValid = accounts.some(account =>
        account.pass1 === pass1 &&
        account.pass2 === pass2
      );

      // 5. Nếu đúng
      if (isValid) {
        sessionStorage.setItem("loggedIn", "true");

        localStorage.removeItem("attempts");
        localStorage.removeItem("lockUntil");

        window.location.href = "home.html";
      }

      // 6. Nếu sai
      else {
        let attempts = Number(localStorage.getItem("attempts")) || 0;
        attempts++;

        localStorage.setItem("attempts", attempts);

        const remaining = 5 - attempts;

        document.getElementById("error").style.display = "block";

        if (attempts >= 5) {
          const lockTime = Date.now() + 60000; // 1 phút
          localStorage.setItem("lockUntil", lockTime);

          document.getElementById("error").innerText =
            "Có mật khẩu cũng sai nữa. Tự kiểm điểm 1p đi";

          return;
        }

        document.getElementById("error").innerText =
          "Sai thông tin. Bạn còn " + remaining + " lần trước khi ra đảo";
      }
    }
  </script>

</body>
</html>
