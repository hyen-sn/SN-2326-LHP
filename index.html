<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kỷ yếu lớp 12SN</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-shell">
      <div class="logo">
        <img src="images/logo-face.jpg" alt="Logo lớp" class="logo-img">
        <span>Salle de nostalgie</span>
      </div>

      <nav class="main-nav">
        <button class="nav-btn active" data-page="pages/trangchu.html">Trang chủ</button>
        <button class="nav-btn" data-page="pages/thanh-vien.html">Thành viên</button>
        <button class="nav-btn" data-page="pages/ky-niem.html">Góc kỷ niệm</button>
        <button class="nav-btn" data-page="pages/loi-nhan.html">Lời nhắn</button>
        <button class="nav-btn" data-page="pages/lien-he.html">Liên hệ</button>
      </nav>
    </div>
  </header>

  <main class="app-main">
    <iframe
      id="contentFrame"
      class="content-frame"
      src="pages/trangchu.html"
      title="Nội dung website"
      loading="eager"
    ></iframe>

    <div class="music-player">
      <button class="music-toggle" id="musicToggle" title="Mở nhạc">🎵</button>

      <div class="music-panel" id="musicPanel">
        <audio id="bgMusic" loop>
          <source src="music/mot_ngay_nao_do.mp3" type="audio/mpeg">
          Trình duyệt của bạn không hỗ trợ phát nhạc.
        </audio>

        <div class="music-controls">
          <button id="playPauseBtn">▶</button>
          <input type="range" id="musicSeek" value="0" min="0" max="100">
          <button id="closeMusicPanel">✕</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>2326 - Web SN cuối cùng</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
